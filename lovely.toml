[manifest]
version = "1.0.0"
dump_lua = true
priority = 10

# Thank you bunco :)
[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''--check the hand first'''
position = 'after'
payload = '''
if G.jokers ~= nil then
    SMODS.calculate_context({abn_play_cards = true})
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = "self.facing='back'"
position = "after"
payload = '''
if self.ability.set == "Joker" then
    self.ability.joker_flipped = true
    self:set_cost()
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = "self.facing='front'"
position = "after"
payload = '''
if self.ability.set == "Joker" then
    self.ability.joker_flipped = nil
    self:set_cost()
end
'''
match_indent = true
